name: Docs

on:
  push:
  pull_request:

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docs tree
        shell: bash
        run: |
          test -d docs
          test -f README.md
          test -f CONTRIBUTING.md
          test -f CHANGELOG.md
          test -f SECURITY.md
          test -f SUPPORT.md
          test -f docs/architecture/overview.md
          test -f docs/tutorials/first-contribution.md
          test -f docs/showcase/demo-plan.md
